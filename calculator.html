<style>
  body {font-family:Arial,Helvetica,sans-serif;margin:0;padding:0 1rem;background:#f2f2f2;}

            border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.15);}
  h1 {text-align:center;margin-bottom:1.5rem;}
  form {display:flex;flex-direction:column;gap:1.5rem;}
  fieldset {border:1px solid #999;padding:1rem;border-radius:5px;}
  legend {font-weight:bold;padding:0 .5rem;}
  label {display:flex;flex-direction:column;font-weight:600;}
  .radio-group {display:flex;flex-wrap:wrap;gap:.5rem 1.5rem;margin-bottom:1rem;}
  .input-group {margin-top:.5rem;}
  input[type="text"], input[type="number"], select, button {
    width:100%;padding:.6rem;font-size:1rem;
    border:1px solid #999;border-radius:4px;box-sizing:border-box;
  }
  button {background:#005A9C;color:#fff;cursor:pointer;font-weight:600;margin-top:1rem;}
  button:hover {background:#003087;}
  #shareSmsBtn { background: #555; margin-top: 1rem; }
  #shareSmsBtn:hover { background: #333; }
  .result {margin-top:2rem;padding:1rem;border:2px solid #444;background:#fafafa;border-radius:5px;}
  .pass {color:#006400;font-weight:bold;}
  .fail {color:#C8102E;font-weight:bold;}
  @media (max-width:400px){
    h1{font-size:1.5rem}
    select,button,input{font-size:.95rem}
  }
</style>
</head>

      </div>
    </fieldset>
    <fieldset>
      <legend>Upper-Body Component</legend>
      <div class="radio-group">
        <label><input type="radio" name="upper" value="pushups" checked> Push‑ups (1 min)</label>

      </div>
      <div class="input-group">
        <label id="upper-label">Repetitions</label>
        <input type="number" id="upper-input" placeholder="e.g., 45" inputmode="numeric" required>
      </div>
    </fieldset>
    <fieldset>
      <legend>Core Component</legend>

        <label><input type="radio" name="core" value="situps" checked> Sit‑ups (1 min)</label>
        <label><input type="radio" name="core" value="crunch"> Cross-Leg Reverse Crunch (2 min)</label>

      </div>
      <div class="input-group">
        <label id="core-label">Repetitions</label>
        <input type="text" id="core-input" placeholder="e.g., 50" inputmode="numeric" required>
      </div>
    </fieldset>
    <fieldset>
      <legend>Waist-to-Height Ratio (WHtR)</legend>
      <label>Waist (inches)
        <input type="number" id="waist" min="10" max="80" step="0.5" required placeholder="e.g., 34.5" inputmode="decimal">
      </label>
      <label>Height (inches)

      </label>
    </fieldset>
    <button type="submit">Calculate Score</button>
  </form>

</div>

const PT_MINIMUMS = { run: 35.0, hamr: 35.0, pushups: 2.5, handRelease: 2.5, situps: 2.5, crunch: 2.5, plank: 2.5, whtr: 0 };
const SATISFACTORY_MIN = 75;

// ========================================================================
// HELPER FUNCTIONS
// ========================================================================
const mmssToSec = str => {
  if (typeof str !== 'string') return 0;
  const [m = 0, s = 0] = str.split(':').map(Number);
  return (m * 60) + s;
};

const getAgeBucket = age => {
  if (age < 25) return "<25";
  if (age <= 29) return "25-29";
  if (age <= 34) return "30-34";
  if (age <= 39) return "35-39";
  if (age <= 44) return "40-44";
  if (age <= 49) return "45-49";
  if (age <= 54) return "50-54";
  if (age <= 59) return "55-59";
  return "60+";
};

// ========================================================================
// OFFICIAL TIER SEARCH LOGIC (THIS SNAPS TO THE APPROPRIATE LOWER TIER)
// ========================================================================
const lookupCardioTime = (valArr, userValSec) => {
  for (let i = 0; i < valArr.length; i++) {
    if (userValSec <= mmssToSec(valArr[i])) return PtsCardio[i];
  }
  return 0; // Fails to meet minimum
};

const lookupHigherIsBetter = (valArr, userVal, isCardio, isTime = false) => {
  const pointsRef = isCardio ? PtsCardio : PtsUpperCore;
  for (let i = 0; i < valArr.length; i++) {
    const tierValue = isTime ? mmssToSec(valArr[i]) : valArr[i];
    if (userVal >= tierValue) return pointsRef[i];
  }
  return 0; // Fails to meet minimum
};

// WtHR calculates EXACT points based on the new point breakdown
const lookupWhtr = (waist, height) => {
  if (!waist || !height) return { pts: 0, ratio: "N/A", category: "Invalid" };
  
  // Calculate and round to exactly 2 decimal places to match Air Force calculation rules
  const ratioNum = Math.round((waist / height) * 100) / 100;
  const ratioStr = ratioNum.toFixed(2);
  
  // Assign points strictly according to the new bracket
  if (ratioNum < 0.50) return { pts: 20.0, ratio: ratioStr, category: "Low Risk" };
  if (ratioNum === 0.50) return { pts: 19.0, ratio: ratioStr, category: "Moderate Risk" };
  if (ratioNum === 0.51) return { pts: 18.0, ratio: ratioStr, category: "Moderate Risk" };
  if (ratioNum === 0.52) return { pts: 17.0, ratio: ratioStr, category: "Moderate Risk" };
  if (ratioNum === 0.53) return { pts: 16.0, ratio: ratioStr, category: "Moderate Risk" };
  if (ratioNum === 0.54) return { pts: 15.0, ratio: ratioStr, category: "Moderate Risk" };
  if (ratioNum === 0.55) return { pts: 12.5, ratio: ratioStr, category: "High Risk" };
  if (ratioNum === 0.56) return { pts: 10.0, ratio: ratioStr, category: "High Risk" };
  if (ratioNum === 0.57) return { pts: 7.5, ratio: ratioStr, category: "High Risk" };
  if (ratioNum === 0.58) return { pts: 5.0, ratio: ratioStr, category: "High Risk" };
  if (ratioNum === 0.59) return { pts: 2.5, ratio: ratioStr, category: "High Risk" };
  
  return { pts: 0.0, ratio: ratioStr, category: "Very High Risk" };
};

// ========================================================================
// DYNAMIC UI UPDATES & INPUT FORMATTING
// ========================================================================
const handleTimeInput = (event) => {
  const input = event.target;
  let isTimeField = (input.id === 'cardio-input' && document.querySelector('input[name="cardio"]:checked').value === 'run') ||
                    (input.id === 'core-input' && document.querySelector('input[name="core"]:checked').value === 'plank');

  if (isTimeField) {
    const digits = input.value.replace(/\D/g, '').substring(0, 4);
    let formattedValue = digits;
    if (digits.length > 2) {
      formattedValue = `${digits.substring(0, digits.length - 2)}:${digits.substring(digits.length - 2)}`;
    }
    input.value = formattedValue;
  }
};

const updateInputLabel = (radioName, mappings) => {
  document.querySelectorAll(`input[name="${radioName}"]`).forEach(radio => {
    radio.addEventListener('change', (e) => {
      const config = mappings[e.target.value];
      const labelEl = document.getElementById(`${radioName}-label`);
      const inputEl = document.getElementById(`${radioName}-input`);
      if (labelEl) labelEl.textContent = config.label;
      if (inputEl) {
        inputEl.placeholder = config.placeholder;
        inputEl.value = '';
        inputEl.inputmode = config.inputmode;
        inputEl.type = (config.inputmode === 'numeric' && radioName !== 'core') ? 'number' : 'text';
      }
    });
  });
};

document.addEventListener('DOMContentLoaded', () => {
  updateInputLabel('cardio', {
    run:  { label: 'Run Time (mm:ss)', placeholder: 'e.g., 14:30', inputmode: 'tel'},
    hamr: { label: 'HAMR Shuttles', placeholder: 'e.g., 65', inputmode: 'numeric'}
  });
  updateInputLabel('upper', {
    pushups:     { label: 'Push-ups (1 min)', placeholder: 'e.g., 45', inputmode: 'numeric'},
    handRelease: { label: 'HR Push-ups (2 min)', placeholder: 'e.g., 35', inputmode: 'numeric'}
  });
  updateInputLabel('core', {
    situps:  { label: 'Repetitions', placeholder: 'e.g., 50', inputmode: 'numeric' },
    crunch:  { label: 'Repetitions', placeholder: 'e.g., 40', inputmode: 'numeric' },
    plank:   { label: 'Plank Time (mm:ss)', placeholder: 'e.g., 2:15', inputmode: 'tel' }
  });

  document.getElementById('cardio-input').addEventListener('input', handleTimeInput);
  document.getElementById('core-input').addEventListener('input', handleTimeInput);
});

// ========================================================================
// FORM SUBMISSION & CALCULATION
// ========================================================================
document.getElementById('ptForm').addEventListener('submit', (e) => {
  e.preventDefault(); 
  
  const genderStr = document.getElementById('gender').value;
  const genderIdx = genderStr === 'male' ? 0 : 1;
  const age = parseInt(document.getElementById('age').value, 10);
  const waist = parseFloat(document.getElementById('waist').value);
  const height = parseFloat(document.getElementById('height').value);
  
  const cardioChoice = document.querySelector('input[name="cardio"]:checked').value;
  const upperChoice = document.querySelector('input[name="upper"]:checked').value;
  const coreChoice = document.querySelector('input[name="core"]:checked').value;

  const cardioInput = document.getElementById('cardio-input').value;
  const upperInput = parseInt(document.getElementById('upper-input').value, 10);
  const coreInput = document.getElementById('core-input').value;

  if (isNaN(age) || isNaN(waist) || isNaN(height)) {
    return alert('Please fill out Age, Waist, and Height fields.');
  }
  const bucketData = PT_DATA[getAgeBucket(age)];

  let cardioPts = 0, cardioDisplay = cardioInput;
  if (cardioChoice === 'run') {
      if (!/^\d{1,2}:\d{2}$/.test(cardioInput)) return alert('Run time must be in mm:ss format.');
      cardioPts = lookupCardioTime(bucketData.run[genderIdx], mmssToSec(cardioInput));
  } else { 
      if (isNaN(parseInt(cardioInput, 10))) return alert('HAMR Shuttles must be a number.');
      cardioPts = lookupHigherIsBetter(bucketData.hamr[genderIdx], parseInt(cardioInput, 10), true);
      cardioDisplay = `${parseInt(cardioInput, 10)} shuttles`;
  }
  
  const upperPts = lookupHigherIsBetter(bucketData[upperChoice][genderIdx], upperInput, false);

  let corePts = 0, coreDisplay = coreInput;
  if (coreChoice === 'plank') {
    if (!/^\d{1,2}:\d{2}$/.test(coreInput)) return alert('Plank time must be in mm:ss format.');
    corePts = lookupHigherIsBetter(bucketData.plank[genderIdx], mmssToSec(coreInput), false, true);
  } else {
    if (isNaN(parseInt(coreInput, 10))) return alert('Core repetitions must be a number.');
    corePts = lookupHigherIsBetter(bucketData[coreChoice][genderIdx], parseInt(coreInput, 10), false);
    coreDisplay = `${parseInt(coreInput, 10)} reps`;
  }

  const whtrInfo = lookupWhtr(waist, height);

  const totalScore = cardioPts + upperPts + corePts + whtrInfo.pts;
  
  const passedCardio = cardioPts >= PT_MINIMUMS[cardioChoice];
  const passedUpper = upperPts >= PT_MINIMUMS[upperChoice];
  const passedCore = corePts >= PT_MINIMUMS[coreChoice];
  const passedWhtr = whtrInfo.pts > PT_MINIMUMS.whtr; // Fails at 0 points
  const passedComposite = totalScore >= SATISFACTORY_MIN;
  const isPass = passedCardio && passedUpper && passedCore && passedWhtr && passedComposite;

  const getResultLineHTML = (label, display, points, passed) =>
    `<p>${label} (${display}): <strong>${points.toFixed(1)} pts</strong> ${passed ? '✅' : '❌'}</p>`;
  
  const getResultLineText = (label, display, points, passed) =>
    `${label} (${display}): ${points.toFixed(1)} pts ${passed ? '✅' : '❌'}`;

  const cardioLabel = cardioChoice === 'run' ? '2-Mile Run' : 'HAMR Shuttle';
  const upperLabel = upperChoice === 'pushups' ? 'Push-ups' : 'Hand-Release';
  const coreLabel = coreChoice === 'plank' ? 'Plank' : (coreChoice === 'situps' ? 'Sit-ups' : 'Reverse Crunch');

  const outputDiv = document.getElementById('output');
  outputDiv.style.display = 'block';
  outputDiv.innerHTML = `
    <h2>Result (${genderStr.charAt(0).toUpperCase() + genderStr.slice(1)}, Age ${age})</h2>
    ${getResultLineHTML(cardioLabel, cardioDisplay, cardioPts, passedCardio)}
    ${getResultLineHTML(upperLabel, `${upperInput} reps`, upperPts, passedUpper)}
    ${getResultLineHTML(coreLabel, coreDisplay, corePts, passedCore)}
    ${getResultLineHTML(`WHtR`, `${whtrInfo.ratio} – ${whtrInfo.category}`, whtrInfo.pts, passedWhtr)}
    <hr>
    <p><strong>Total Score:</strong> ${totalScore.toFixed(1)} pts</p>
    <p class="${isPass ? 'pass' : 'fail'}">
      <strong>Overall Result: ${isPass ? 'PASS' : 'FAIL'}</strong><br>
      <small>${passedComposite ? 'Composite score met.' : 'Composite score not met.'} You must meet all component minimums and achieve a total score of ${SATISFACTORY_MIN} or higher.</small>
    </p>
    <button type="button" id="shareSmsBtn">Share via Text/SMS</button>
  `;

  document.getElementById('shareSmsBtn').addEventListener('click', () => {
    const smsBody = `USAF PT Score: ${isPass ? 'PASS' : 'FAIL'} - ${totalScore.toFixed(1)} pts
---
${getResultLineText(cardioLabel, cardioDisplay, cardioPts, passedCardio)}
${getResultLineText(upperLabel, `${upperInput} reps`, upperPts, passedUpper)}
${getResultLineText(coreLabel, coreDisplay, corePts, passedCore)}
${getResultLineText('WHtR', whtrInfo.ratio, whtrInfo.pts, passedWhtr)}`;
    window.location.href = `sms:?&body=${encodeURIComponent(smsBody)}`;
  });
  
  outputDiv.scrollIntoView({ behavior: 'smooth' });
});
</script>
