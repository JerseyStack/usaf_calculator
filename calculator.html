<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>USAF PT Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {font-family:Arial,Helvetica,sans-serif;margin:0;padding:0 1rem;background:#f2f2f2;}
  .wrapper {max-width:800px;margin:2rem auto;background:#fff;padding:1.5rem;
            border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.15);}
  h1 {text-align:center;margin-bottom:1.5rem;}
  form {display:flex;flex-direction:column;gap:1.5rem;}
  fieldset {border:1px solid #999;padding:1rem;border-radius:5px;}
  legend {font-weight:bold;padding:0 .5rem;}
  label {display:flex;flex-direction:column;font-weight:600;}
  .radio-group {display:flex;flex-wrap:wrap;gap:.5rem 1.5rem;margin-bottom:1rem;}
  .input-group {margin-top:.5rem;}
  input[type="text"], input[type="number"], select, button {
    width:100%;padding:.6rem;font-size:1rem;
    border:1px solid #999;border-radius:4px;box-sizing:border-box;
  }
  button {background:#005A9C;color:#fff;cursor:pointer;font-weight:600;margin-top:1rem;}
  button:hover {background:#003087;}
  .result {margin-top:2rem;padding:1rem;border:2px solid #444;background:#fafafa;border-radius:5px;}
  .pass {color:#006400;font-weight:bold;}
  .fail {color:#C8102E;font-weight:bold;}
  @media (max-width:400px){
    h1{font-size:1.5rem}
    select,button,input{font-size:.95rem}
  }
</style>
</head>
<body>
<div class="wrapper">
  <h1>USAF PT Calculator</h1>
  <form id="ptForm">
    <fieldset>
      <legend>Demographics</legend>
      <label>Gender
        <select id="gender" required>
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
      </label>
      <label>Age (years)
        <input type="number" id="age" min="17" max="80" required placeholder="e.g., 27" inputmode="numeric">
      </label>
    </fieldset>
    <fieldset>
      <legend>Cardio Component</legend>
      <div class="radio-group">
          <label><input type="radio" name="cardio" value="run" checked> 2‑Mile Run</label>
          <label><input type="radio" name="cardio" value="hamr"> HAMR Shuttle</label>
      </div>
      <div class="input-group">
        <label id="cardio-label">Score (mm:ss for Run, Reps for HAMR)</label>
        <input type="text" id="cardio-input" placeholder="e.g., 14:30" required>
      </div>
    </fieldset>
    <fieldset>
      <legend>Upper-Body Component</legend>
      <div class="radio-group">
        <label><input type="radio" name="upper" value="pushups" checked> Push‑ups (1 min)</label>
        <label><input type="radio" name="upper" value="handRelease"> Hand-Release Push‑ups (2 min)</label>
      </div>
      <div class="input-group">
        <label>Repetitions</label>
        <input type="number" id="upper-input" placeholder="e.g., 45" inputmode="numeric" required>
      </div>
    </fieldset>
    <fieldset>
      <legend>Core Component</legend>
      <div class="radio-group">
        <label><input type="radio" name="core" value="situps" checked> Sit‑ups (1 min)</label>
        <label><input type="radio" name="core" value="crunch"> Cross-Leg Reverse Crunch (2 min)</label>
        <label><input type="radio" name="core" value="plank"> Forearm Plank (mm:ss)</label>
      </div>
      <div class="input-group">
        <label id="core-label">Score (Reps or mm:ss)</label>
        <input type="text" id="core-input" placeholder="e.g., 50" required>
      </div>
    </fieldset>
    <button type="submit">Calculate Score</button>
  </form>
  <div id="output" class="result" style="display:none;"></div>
</div>

<script>
// Helper to parse MM:SS into total seconds

  if (!timeStr.includes(':')) return parseInt(timeStr) * 60; // fallback
  const parts = timeStr.split(':');
  return parseInt(parts[0]) * 60 + parseInt(parts[1]);
}

// Map age input to exact bracket
function getAgeGroup(age) {
  if (age < 25) return "<25";
  if (age <= 29) return "25-29";
  if (age <= 34) return "30-34";
  if (age <= 39) return "35-39";
  if (age <= 44) return "40-44";
  if (age <= 49) return "45-49";
  if (age <= 54) return "50-54";
  if (age <= 59) return "55-59";
  return "60+";
}

// Calculate the score using threshold evaluation logic
function calculateComponentScore(val, thresholds, isRun) {
  if (!thresholds) return 0;
  
  for (let i = 0; i < thresholds.length; i++) {
    let [threshold, points] = thresholds[i];
    
    // For Run: Lower time is better (so check if val <= threshold)
    if (isRun) {
      if (val <= threshold) return points;
    } 
    // For Reps and Plank: Higher is better (so check if val >= threshold)
    else {
      if (val >= threshold) return points;
    }
  }
  return 0; // Failed to meet minimum threshold
}

// Main Event Listener
document.getElementById('ptForm').addEventListener('submit', function(e) {
  e.preventDefault();

  const gender = document.getElementById('gender').value;
  const age = parseInt(document.getElementById('age').value);
  const ageGroup = getAgeGroup(age);

  // Cardio values
  const cardioType = document.querySelector('input[name="cardio"]:checked').value;
  const cardioRaw = document.getElementById('cardio-input').value;
  const cardioVal = (cardioType === 'run') ? timeToSeconds(cardioRaw) : parseInt(cardioRaw);

  // Upper values
  const upperType = document.querySelector('input[name="upper"]:checked').value;
  const upperVal = parseInt(document.getElementById('upper-input').value);

  // Core values
  const coreType = document.querySelector('input[name="core"]:checked').value;
  const coreRaw = document.getElementById('core-input').value;
  const coreVal = (coreType === 'plank') ? timeToSeconds(coreRaw) : parseInt(coreRaw);

  // Check if data block exists for this demographic
  if (!PT_DATA[gender] || !PT_DATA[gender][ageGroup]) {
    alert("Data not populated for this age group yet. Add it to PT_DATA!");
    return;
  }

  const userGroupData = PT_DATA[gender][ageGroup];

  // Evaluate Points
  const cardioScore = calculateComponentScore(cardioVal, userGroupData[cardioType], cardioType === 'run');
  const upperScore = calculateComponentScore(upperVal, userGroupData[upperType], false);
  const coreScore = calculateComponentScore(coreVal, userGroupData[coreType], false);

  const totalScore = cardioScore + upperScore + coreScore;
  const passed = (totalScore >= 75) && (cardioScore > 0 && upperScore > 0 && coreScore > 0);

  // Output formatting
  const outputDiv = document.getElementById('output');
  outputDiv.style.display = 'block';
  outputDiv.innerHTML = `
    <h3>Results</h3>
    <p>Cardio (${cardioType}): ${cardioScore.toFixed(1)} pts</p>
    <p>Upper (${upperType}): ${upperScore.toFixed(1)} pts</p>
    <p>Core (${coreType}): ${coreScore.toFixed(1)} pts</p>
    <hr>
    <p><strong>Total Score: ${totalScore.toFixed(1)}</strong></p>
    <p class="${passed ? 'pass' : 'fail'}">${passed ? 'PASS' : 'FAIL (Minimum score is 75, with passing marks in all categories)'}</p>
  `;
});
</script>
</body>
</html>
